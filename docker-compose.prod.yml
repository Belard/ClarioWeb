# Production – optimised nginx image serving the compiled React app
# Usage: docker compose -f docker-compose.prod.yml up --build
#
# The API is expected to run on the same server on port 3001.
# nginx proxies /api/, /auth/, /oauth/, and /uploads/ to 127.0.0.1:3001.

services:
  app:
    build:
      context: .
      target: prod
    # network_mode: host lets nginx reach the Go API at 127.0.0.1:3001
    # and exposes nginx directly on the host at port 3000
    network_mode: host
    environment:
      - NODE_ENV=production
    restart: unless-stopped
